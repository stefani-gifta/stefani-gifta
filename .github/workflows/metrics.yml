name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: Asia/Jakarta
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_stars: no
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: no
          plugin_people: yes
          plugin_people_types: contributors
          plugin_repositories: yes
          plugin_repositories_featured: cv-Ingreadyent-2026
          plugin_calendar: yes
          config_order: base.header, isocalendar, languages, habits, repositories, people, calendar
          repositories_skipped: stefani-gifta, stefani-gifta/stefani-gifta
          committer_message: "💜"
          
